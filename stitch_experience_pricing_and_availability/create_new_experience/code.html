<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-[480px] mx-auto flex flex-col min-h-screen bg-white dark:bg-slate-900 shadow-xl overflow-hidden">
<header class="flex items-center p-4 border-b border-slate-200 dark:border-slate-800">
<button class="text-slate-900 dark:text-slate-100 p-1">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<h1 class="flex-1 text-center text-lg font-bold tracking-tight">Create New Experience</h1>
<div class="w-10 flex justify-end">
<span class="text-primary font-semibold text-sm">Save</span>
</div>
</header>
<div class="p-4 space-y-4">
<div class="space-y-2">
<div class="flex justify-between items-center">
<p class="text-slate-900 dark:text-slate-100 font-semibold">Basic Info</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Step 1 of 3</p>
</div>
<div class="w-full bg-slate-200 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full w-1/3 rounded-full"></div>
</div>
<p class="text-slate-500 dark:text-slate-400 text-xs">Steps: Info, Pricing, Availability</p>
</div>
</div>
<main class="flex-1 overflow-y-auto px-4 pb-24 space-y-6">
<section class="space-y-4 pt-2">
<div>
<label class="block text-slate-900 dark:text-slate-100 font-semibold mb-2" for="title">Experience Title</label>
<input class="w-full h-14 px-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" id="title" placeholder="e.g. Moonlight Kayaking in Bioluminescent Bay" type="text"/>
</div>
<div>
<label class="block text-slate-900 dark:text-slate-100 font-semibold mb-2">Category</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium">Hiking</button>
<button class="px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-lg text-sm font-medium">Diving</button>
<button class="px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-lg text-sm font-medium">Kayaking</button>
<button class="px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-lg text-sm font-medium">Climbing</button>
<button class="px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-lg text-sm font-medium">Surfing</button>
</div>
</div>
<div>
<label class="block text-slate-900 dark:text-slate-100 font-semibold mb-2" for="description">Description</label>
<textarea class="w-full p-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 resize-none" id="description" placeholder="Tell travelers about the unique adventure they will experience..." rows="4"></textarea>
</div>
<div>
<label class="block text-slate-900 dark:text-slate-100 font-semibold mb-2">Cover Photo</label>
<div class="relative group">
<div class="w-full aspect-video bg-slate-100 dark:bg-slate-800 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-600 flex flex-col items-center justify-center text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-4xl mb-2">add_a_photo</span>
<span class="text-sm font-medium">Add high-quality photos</span>
<p class="text-xs mt-1">PNG, JPG up to 10MB</p>
</div>
<input class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
</div>
<div class="grid grid-cols-3 gap-2">
<div class="aspect-square bg-slate-200 dark:bg-slate-700 rounded-lg relative overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Clear blue water with a small kayak" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHoEr7X8jjnUwU9fZSZKqNIzfaBTxuQj6kmo0_kr7OjLMzoJHe9FEO-tTrLV-19-h5nKrl-1RezyGcVeZoUkDcqAeOGUzT7UXev8If4hki2aJV1yevTyqcnt5kSwtxpeQbd9sHUYT_1kJnj9d87oqRxlHRROVlpXthHk_dm2PP6J9p9V9_jPKqSbqwvs6kYMh_d0pY76A2WXI3UdFOw0-4fXuTOJsm86r6Ys67xNRq1uovOjrX1ZlG7ioU0jSYepNNie0iB94S8Qc"/>
<button class="absolute top-1 right-1 bg-black/50 text-white rounded-full p-0.5">
<span class="material-symbols-outlined text-xs">close</span>
</button>
</div>
<div class="aspect-square bg-slate-100 dark:bg-slate-800 rounded-lg border-2 border-dashed border-slate-300 dark:border-slate-600 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400">add</span>
</div>
</div>
</section>
</main>
<footer class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto p-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-t border-slate-200 dark:border-slate-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                Next Step
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
</div>
</body></html>
